<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PaisaFlow - Premium Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" type="image/png" href="../assets/img/logo.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="../css/styles.css" rel="stylesheet">
    <script src="../js/security.js"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  </head>
  <body>

    <!-- TOP HEADER -->
    <div class="top-header" style="padding: 24px 24px 10px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
          <div style="display:flex; gap:16px; align-items:center;">
              <div id="profile-container" class="profile-pic glass" style="flex-shrink: 0; overflow:hidden;">
                <!-- Avatar injected via JS -->
              </div>
              <div style="display:flex; flex-direction:column; justify-content:center;">
                 <h1 id="display-name" style="font-size: 18px; margin:0; font-weight:800; line-height:1.2;">Member</h1>
                 <p style="font-size: 11px; opacity:0.5; margin:2px 0 0;" id="display-email">Elite Digital Vault 2.0</p>
              </div>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="arrow-btn" onclick="syncToSheets()" style="flex-shrink:0;"><span class="material-icons">sync</span></button>
            <button class="arrow-btn" onclick="logout()" style="flex-shrink:0; background:rgba(244,63,94,0.1); border-color:rgba(244,63,94,0.2);"><span class="material-icons" style="color:#f43f5e">power_settings_new</span></button>
          </div>
      </div>
    </div>

    <!-- TABS NAVIGATION (SYNCED WITH SWIPE) -->
    <div class="time-pills" style="padding: 10px 24px 20px;">
        <button class="pill active" id="tab-day" onclick="jumpToPage(0)">Day</button>
        <button class="pill" id="tab-week" onclick="jumpToPage(1)">Week</button>
        <button class="pill" id="tab-month" onclick="jumpToPage(2)">Month</button>
    </div>

    <!-- SWIPE SYSTEM (MAIN CONTENT) -->
    <div class="swipe-viewport" id="swipe-viewport">
        <div class="swipe-container" id="swipe-container">
            <!-- PAGE 1: DAY -->
            <div class="swipe-page" id="day-view-page"></div>
            <!-- PAGE 2: WEEK -->
            <div class="swipe-page" id="week-view-page"></div>
            <!-- PAGE 3: MONTH -->
            <div class="swipe-page" id="month-view-page"></div>
        </div>
    </div>

    <!-- LEDGER & EVENTS (FULLSCREEN MODALS OR TABS) -->
    <div id="ledger-overlay" class="modal-overlay" style="align-items: flex-end; padding:0;">
        <div class="modal glass" style="width:100%; height:90%; border-radius:36px 36px 0 0; border-bottom:none; padding:32px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
                <h2 style="margin:0; font-weight:800;">Ledger Central</h2>
                <button class="arrow-btn" onclick="closeLedger()"><span class="material-icons">close</span></button>
            </div>
            <div id="ledger-content" style="overflow-y:auto; height:calc(100% - 60px);"></div>
        </div>
    </div>

    <!-- BOTTOM TAB BAR -->
    <div class="navbar">
        <div class="nav-item active" id="nav-home" onclick="closeAllOverlays()">
           <span class="material-icons">grid_view</span>
           <span>Home</span>
        </div>
        <div class="nav-item" id="nav-ledger" onclick="openLedger()">
           <span class="material-icons">account_balance_wallet</span>
           <span>Ledger</span>
        </div>
        
        <div style="width: 80px;"></div>

        <div class="nav-item" id="nav-events" onclick="switchTab('events', this)">
           <span class="material-icons">auto_awesome</span>
           <span>Events</span>
        </div>
        <div class="nav-item" id="nav-elite">
           <span class="material-icons">workspace_premium</span>
           <span>Elite</span>
        </div>
    </div>

    <!-- Floating Action Button -->
    <div class="fab-container">
        <button class="fab" onclick="openAddModal()">
           <span class="material-icons" style="font-size: 32px;">add</span>
        </button>
    </div>

    <!-- MODALS (SAME AS BEFORE) -->
    <div class="modal-overlay" id="add-modal">
       <div class="modal glass" style="max-width:440px; border-radius:32px; padding:32px;">
          <h2 style="margin:0 0 24px; font-weight:800;">Entry</h2>
          <form id="transaction-form" onsubmit="submitTransaction(event)">
             <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                <div class="form-group"><label>Type</label><select id="tx-type" name="type" required><option value="Expense">Expense</option><option value="Income">Income</option></select></div>
                <div class="form-group"><label>Date</label><input type="date" id="tx-date" name="date" required></div>
             </div>
             <div class="form-group" style="margin-bottom:24px;">
                <label>Amount</label>
                <input type="number" id="tx-amount" name="amount" required step="0.01" style="font-size:32px; font-weight:800; color:var(--accent-color);">
             </div>
             <div class="form-group" style="margin-bottom:16px;">
                <label>Category</label>
                <select id="tx-category" name="category" required>
                   <option value="Food 🍔">Food 🍔</option>
                   <option value="Travel 🚗">Travel 🚗</option>
                   <option value="Bills 💡">Bills 💡</option>
                   <option value="Shopping 🛍️">Shopping 🛍️</option>
                   <option value="Salary 🏦">Salary 🏦</option>
                   <option value="Other 📌">Other 📌</option>
                </select>
             </div>
             <div style="display:flex; gap:12px;">
                <button type="button" class="pill-btn" onclick="closeAddModal()" style="background:rgba(255,255,255,0.05);">Dismiss</button>
                <button type="submit" class="pill-btn highlight" style="flex:1;">Submit</button>
             </div>
          </form>
       </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/app.js"></script>
  </body>
</html>
