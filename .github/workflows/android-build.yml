name: Paisa Flow APK Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK (Cloud TWA)
        run: |
          mkdir build-report
          bubblewrap build --manifest=https://fromthescreen4-hue.github.io/paisaflow/manifest.json --skipSigning
        continue-on-error: true

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: paisa-flow-vault-debug
          path: ./*.apk
